kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  ipFamily: dual
nodes:
- role: control-plane
  # monta il Docker socket dell'host, abilitando CAPD a creare container che faranno da Nodi nei Workload Cluster
  extraMounts:
    - hostPath: /var/run/docker.sock
      containerPath: /var/run/docker.sock

