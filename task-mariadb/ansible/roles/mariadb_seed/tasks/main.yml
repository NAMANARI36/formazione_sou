---
# Ricrea da zero lo schema applicativo e lo popola con dati di test deterministici
# per volume. Il DROP iniziale garantisce che rilanciare il ruolo produca sempre
# lo stesso dataset, condizione necessaria perché la verifica di consistenza
# confronti contro uno stato noto.

- name: Creazione della directory temporanea per gli script SQL
  ansible.builtin.file:
    path: "{{ mariadb_seed_tmp_dir }}"
    state: directory
    mode: "0700"

- name: Copia dello script di creazione dello schema
  ansible.builtin.copy:
    src: schema.sql
    dest: "{{ mariadb_seed_tmp_dir }}/schema.sql"
    mode: "0600"

- name: Generazione dello script di popolamento
  ansible.builtin.template:
    src: seed.sql.j2
    dest: "{{ mariadb_seed_tmp_dir }}/seed.sql"
    mode: "0600"

- name: Creazione dello schema
  community.mysql.mysql_db:
    name: "{{ mariadb_database_name }}"
    state: import
    target: "{{ mariadb_seed_tmp_dir }}/schema.sql"
    login_unix_socket: "{{ mariadb_socket_path }}"

- name: Popolamento delle tabelle
  community.mysql.mysql_db:
    name: "{{ mariadb_database_name }}"
    state: import
    target: "{{ mariadb_seed_tmp_dir }}/seed.sql"
    login_unix_socket: "{{ mariadb_socket_path }}"

- name: Rimozione degli script temporanei
  ansible.builtin.file:
    path: "{{ mariadb_seed_tmp_dir }}"
    state: absent