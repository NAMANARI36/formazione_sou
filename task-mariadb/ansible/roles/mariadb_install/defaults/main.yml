---
# Pacchetti installati sul managed node.
# python3-pymysql è richiesto dai moduli community.mysql, che aprono la connessione al database

# Pacchetti necessari per l'installazione di MariaDB e per la gestione dei database via Ansible
mariadb_install_packages:
  - mariadb-server
  - mariadb-client
  - python3-pymysql

# Nome del servizio systemd di MariaDB
mariadb_install_service_name: mariadb

# File di configurazione dedicato: i .cnf in conf.d vengono letti dopo quelli
# di default, quindi le direttive qui definite prevalgono senza toccare
# i file gestiti dal package manager.
mariadb_install_config_file: /etc/mysql/mariadb.conf.d/99-ansible.cnf

# 0.0.0.0 rende l'istanza raggiungibile dalla rete privata: necessario perché
# la verifica di consistenza legge entrambe le istanze via TCP.
mariadb_install_bind_address: "0.0.0.0"