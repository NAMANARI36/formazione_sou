---
# Installa MariaDB ne garantisce l'avvio e applica la configurazione di base
# comune a entrambe le istanze 

- name: Installazione dei pacchetti MariaDB e delle dipendenze Python
# modulo per la gestione dei pacchetti tramite il package manager di Debian/Ubuntu.
  ansible.builtin.apt:
    name: "{{ mariadb_install_packages }}"
    state: present 
    # Permette di allineare l'indice locale allo stato attuale dei repository 
    update_cache: true 
    # Cache dei metadati dei pacchetti aggiornata ogni ora, per evitare di scaricare l'indice ad ogni esecuzione del playbook
    cache_valid_time: 3600

- name: Configurazione del demone di MariaDB
# modulo per la gestione dei file di testo tramite template Jinja2. 
# Il file di configurazione viene generato sul managed node a partire dal template server.cnf.j2, che contiene le direttive di configurazione da applicare al demone del servizio MariaDB.
  ansible.builtin.template:
    src: server.cnf.j2
    dest: "{{ mariadb_install_config_file }}"
    owner: root
    group: root
    mode: "0644"
# Chiamata all'handler Restart MariaDB per applicare la nuova configurazione al demone del servizio MariaDB.
  notify: Restart MariaDB

- name: Avvio e abilitazione del servizio MariaDB
  ansible.builtin.service:
    name: "{{ mariadb_service_name }}"
    state: started
    enabled: true

# I task successivi si connettono via socket Unix: il play gira con become: true,
# quindi l'autenticazione come root@localhost passa tramite il plugin unix_socket
# senza bisogno di alcuna password.

- name: Rimozione degli utenti anonimi
  community.mysql.mysql_user:
    name: ""
    host_all: true
    state: absent
    login_unix_socket: "{{ mariadb_socket_path }}"

- name: Rimozione del database di test
  community.mysql.mysql_db:
    name: test
    state: absent
    login_unix_socket: "{{ mariadb_socket_path }}"

- name: Creazione del database applicativo
  community.mysql.mysql_db:
    name: "{{ mariadb_database_name }}"
    state: present
    login_unix_socket: "{{ mariadb_socket_path }}"

- name: Creazione dell'utente applicativo
  community.mysql.mysql_user:
    name: "{{ mariadb_app_user }}"
    password: "{{ mariadb_app_password }}"
    host: "%"
    priv: "{{ mariadb_database_name }}.*:ALL"
    state: present
    login_unix_socket: "{{ mariadb_socket_path }}"
  no_log: true